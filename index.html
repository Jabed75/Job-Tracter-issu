<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github-Issue-Tracker</title>
    <!-- font awosome -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
     <!-- font integration -->
      <link rel="preconnect" href="https://fonts.googleapis.com">
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
      <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Hind+Siliguri:wght@300;400;500;600;700&family=Manrope:wght@200..800&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Outfit:wght@100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
     <!-- tawling+daisyui -->
      <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
      <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4">
      </script>
      <!-- stylesheet -->
       
      
</head>
<body class="min-h-screen max-w-md bg-base-200 mx-auto">

    <div class="logo w-[200px] mx-auto pt-18">
        <img src="./assets/github-logo.png" alt="">
    </div>
    <h1 class="text-4xl font-bold mt-3 text-center" >Git-Up-issue</h1>
    <p class="text-2xl font-[#64748B] text-center mt-3">Sign in to manage your issues</p>

    <div class="form pt-10">
     <div class="card bg-base-100 w-full max-w-sm shrink-0 shadow mx-auto rounded-2xl">
      <div class="card-body">
        <fieldset class="fieldset">
          <label class="label text-neutral font-bold">Username</label>
          <input id="input-number" maxlength="5" minlength="5" type="text" class="input rounded-full" placeholder="Enter Username"/>
          <label class="label text-neutral font-bold">Password</label>
          <input id="input-pin" maxlength="8" minlength="8" type="password" class="input rounded-full" placeholder="Enter Password" />
          <button id="login-btn" class="btn btn-primary rounded-full mt-4">Sign in</button>
        </fieldset>
      </div>
    </div>
    </div>
  
    <script src="script/login.js"></script>
</body>
</html>
