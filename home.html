     <section>
        <div class=" flex gap-2 justify-between items-center">

        <h2 class="text-2xl font-blod mt-10">GitHub Issues Tracker</h2>
        
        <div class="join">
    <div>
    <label class="input validator join-item">
        <g
          stroke-linejoin="round"
          stroke-linecap="round"
          stroke-width="2.5"
          fill="none"
          stroke="currentColor"
        >
          <rect width="20" height="16" x="2" y="4" rx="2"></rect>
          <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"></path>
        </g>
      </svg>
      <input id="input-search" class="text" placeholder="Search issues..." required />
    </label>
    <div class="validator-hint hidden">text</div>
  </div>
  <button id="btn-issues" class="btn btn-primary join-item">+New issues</button>
</div>
    </div>
    
    </section> 
<!-- all-open-closed button -->
    
  <div id="level-container" class="flex gap-10 mt-18 pt-10">
    <button id="btn-all" class="filter-btn btn btn-primary text-3xl  px-6 py-2 rounded-lg">All</button>
    <button id="btn-open" class="filter-btn btn text-3xl px-6 py-2">Open</button>
    <button id="btn-closed" class="filter-btn btn text-3xl px-6 py-2">Closed</button>
</div>

 <section class="mt-5 shadow-sky-300 pt-10 px-10 rounded-md">
  <div class="bg-white p-6 rounded-lg shadow-md">

  <div class="flex justify-between items-center">
    <div class="flex items-center gap-3">
      
      <!-- Logo -->
      <div class="w-8 h-8  flex items-center justify-center rounded-full">
        <img src="assets/Aperture.png" alt="Logo">
      </div>

      <!-- Text -->
      <div>
        <h1 class="text-2xl font-bold text-gray-800">
          <span id="number-container"></span> issues</h1>
          <p class="text-gray-500 text-sm">
          Track and manage your project issues
        </p>
      </div>

    </div>

    <!-- Right Status -->
    <div class="flex gap-6 text-sm font-medium">

      <div class="flex items-center gap-2">
        <span class="w-3 h-3 bg-green-500 rounded-full"></span>
        <p>Open</p>
      </div>

      <div class="flex items-center gap-2">
        <span class="w-3 h-3 bg-purple-500 rounded-full"></span>
        <p>Closed</p>
      </div>
    </div>
  </div>
</div>
</section>
<section id="spinner" class="flex justify-center items-center py-6 ">
  <span class="loading loading-ring loading-xl"></span>
</section>
   
<section id="word-container" class="bg-gray-200 p-10 w-11/12 mx-auto my-10 grid grid-cols-4 gap-5">
