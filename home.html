<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>Job -tracter-issue</title>
    <link rel="shortcut icon" href="./assets/logo.png" type="image/x-icon">
    <!-- font awosome -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
     <!-- font integration -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
      <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Hind+Siliguri:wght@300;400;500;600;700&family=Manrope:wght@200..800&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Outfit:wght@100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
     <!-- tawling+daisyui -->
      <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
      <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4">
      </script>
      <!-- stylesheet -->
      <link rel="stylesheet" href="./style.css">
</head>
<body>
     <section>
        <div class=" flex gap-2 justify-between items-center">
          <img src="./assets/github-logo.png" alt="">
      <div>
        <h2 class="text-2xl font-blod mt-10">GitHub Issues Tracker</h2>
        </div>
        <div class="join">
    <div>
    <label class="input validator join-item">
        <g
          stroke-linejoin="round"
          stroke-linecap="round"
          stroke-width="2.5"
          fill="none"
          stroke="currentColor"
        >
          <rect width="20" height="16" x="2" y="4" rx="2"></rect>
          <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"></path>
        </g>
      </svg>
      <input type="email" placeholder="Search issues..." required />
    </label>
    <div class="validator-hint hidden">text</div>
  </div>
  <button class="btn btn-neutral join-item">+New issues</button>
</div>
    </div>
    
    </section> 
<!-- all-open-closed button -->
    
  <div id="level-container" class="flex gap-10 mt-18 pt-10">
    <button id="btn-all" class="filter-btn bg-blue-700 text-3xl text-white px-6 py-2 rounded-lg">All</button>
    <button id="btn-open" class="filter-btn text-3xl px-6 py-2">Open</button>
    <button id="btn-closed" class="filter-btn text-3xl px-6 py-2">Closed</button>
</div>

 <section class="mt-5 shadow-sky-300 pt-10 px-10 rounded-md">
  <div class="bg-white p-6 rounded-lg shadow-md">

  <div class="flex justify-between items-center">
    <div class="flex items-center gap-3">
      
      <!-- Logo -->
      <div class="w-8 h-8  flex items-center justify-center rounded-full">
        <img src="assets/Aperture.png" alt="Logo">
      </div>

      <!-- Text -->
      <div>
        <h1 class="text-2xl font-bold text-gray-800">
          <span>50 Issues</span></h1>
        <p class="text-gray-500 text-sm">
          Track and manage your project issues
        </p>
      </div>

    </div>

    <!-- Right Status -->
    <div class="flex gap-6 text-sm font-medium">

      <div class="flex items-center gap-2">
        <span class="w-3 h-3 bg-green-500 rounded-full"></span>
        <p>Open</p>
      </div>

      <div class="flex items-center gap-2">
        <span class="w-3 h-3 bg-purple-500 rounded-full"></span>
        <p>Closed</p>
      </div>
    </div>
  </div>
</div>
</section>
   
<section id="word-container" class="bg-gray-200 p-10 w-11/12 mx-auto my-10 grid grid-cols-4 gap-5">
     
  
   </section>

   <!-- Open the modal using ID.showModal() method -->
<!-- <button class="btn" onclick="my_modal_5.showModal()">open modal</button> -->
<dialog id="my_modal_5" class="modal modal-bottom sm:modal-middle">
  <div class="modal-box">
    <h3 class="text-lg font-bold">Hello!</h3>
    <p class="py-4">Press ESC key or click the button below to close</p>
    <div class="modal-action">
      <form method="dialog">
        <!-- if there is a button in form, it will close the modal -->
        <button class="btn">Close</button>
      </form>
    </div>
  </div>
</dialog>
    <script src="./script/home.js"></script>
</body>
</html>
