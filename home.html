<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>Job -tracter-issue</title>
    <link rel="shortcut icon" href="./assets/logo.png" type="image/x-icon">
    <!-- font awosome -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
     <!-- font integration -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
      <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Hind+Siliguri:wght@300;400;500;600;700&family=Manrope:wght@200..800&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Outfit:wght@100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
     <!-- tawling+daisyui -->
      <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
      <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4">
      </script>
      <!-- stylesheet -->
      <link rel="stylesheet" href="./style.css">
</head>
<body>
  <section class=" p-4 bg-base-100 shadow-sm rounded-xl">
  <div class="flex  md:flex-row gap-4 justify-between items-center">
    
    <div class="flex items-center gap-3">
      <img src="./assets/github-logo.png" alt="GitHub Logo" class="w-10 h-10 object-contain">
      <h2 class="text-xl md:text-2xl font-bold">GitHub Issues Tracker</h2>
    </div>

    <div class="join w-full md:w-auto">
      <div class="flex-grow">
        <label class="input input-bordered join-item flex items-center gap-2 w-full">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            class="h-4 w-4 opacity-70"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <circle cx="11" cy="11" r="8"></circle>
            <path d="m21 21-4.3-4.3"></path>
          </svg>
          <input id="input-search" type="text" class="grow" placeholder="Search issues..." required />
        </label>
      </div>
      <button id="btn-issues" class="btn btn-primary join-item whitespace-nowrap">+ New issues </button>
    </div>
  </div>
</section>
    
<!-- all-open-closed button -->
    
  <div id="level-container" class="flex gap-10 mt-18 pt-10">
    <button id="btn-all" class="filter-btn btn btn-primary text-3xl  px-6 py-2 rounded-lg">All</button>
    <button id="btn-open" class="filter-btn btn text-3xl px-6 py-2">Open</button>
    <button id="btn-closed" class="filter-btn btn text-3xl px-6 py-2">Closed</button>
</div>

 <section class="mt-5 shadow-sky-300 pt-10 px-10 rounded-md">
  <div class="bg-white p-6 rounded-lg shadow-md">

  <div class="flex justify-between items-center">
    <div class="flex items-center gap-3">
      
      <!-- Logo -->
      <div class="w-8 h-8  flex items-center justify-center rounded-full">
        <img src="assets/Aperture.png" alt="Logo">
      </div>

      <!-- Text -->
      <div>
        <h1 class="text-2xl font-bold text-gray-800">
          <span id="number-container"></span> issues</h1>
          <p class="text-gray-500 text-sm">
          Track and manage your project issues
        </p>
      </div>

    </div>

    <!-- Right Status -->
    <div class="flex gap-6 text-sm font-medium">

      <div class="flex items-center gap-2">
        <span class="w-3 h-3 bg-green-500 rounded-full"></span>
        <p>Open</p>
      </div>

      <div class="flex items-center gap-2">
        <span class="w-3 h-3 bg-purple-500 rounded-full"></span>
        <p>Closed</p>
      </div>
    </div>
  </div>
</div>
</section>
<section id="spinner" class="flex justify-center items-center py-6 ">
  <span class="loading loading-ring loading-xl"></span>
</section>
   
<section id="word-container" class="bg-gray-200 p-10 w-11/12 mx-auto my-10 grid lg:grid-cols-4 gap-5">
     
  
   </section>

   <!-- Open the modal using ID.showModal() method -->
<!-- <button class="btn" onclick="my_modal_5.showModal()">open modal</button> -->
<dialog id="my_modal" class="modal modal-bottom sm:modal-middle">
  <div class="modal-box">
   <div id="card-container"></div>
   
    <div class="modal-action">
      <form method="dialog">
        <!-- if there is a button in form, it will close the modal -->
        <button class="btn btn-primary">Close</button>
      </form>
    </div>
  </div>
</dialog>
    <script src="./script/home.js"></script>
</body>
</html>
